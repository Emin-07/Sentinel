{{define "title"}}Sentinel{{end}}

{{define "main"}}
    <h2>Active Processes</h2>
    {{if .Processes}}
    <table>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Observing</th>
            <th>Active</th>
        </tr>
        {{range .Processes}}
        <tr>
            <td>{{.ID}}</td>
            <td><a href="/process/view?id={{.ID}}">{{.Title}}</a></td>
            <td>{{.Observing}}</td>
            <td><div class="circle"></div><td>    
        </tr>
        {{end}}
    {{end}}
    </table>
{{end}}
